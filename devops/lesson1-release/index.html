2.1.0\"）。确保 commit message 遵循 Conventional Commits 规范。", "duration_minutes": 4, "title": "提交更改"}]}, {"file": "03-commit.json", "title": "提交修改", "time": 5, "desc": "发布流程第三步：将版本号和 CHANGELOG 的修改提交到 Git，确保工作区干净并生成规范的提交记录。", "steps": [{"title": "检查工作区状态", "description": "运行 git status 确认工作区干净，没有未暂存或未跟踪的变更。确保只有版本配置文件和 CHANGELOG.md 被修改。", "duration_minutes": 1}, {"title": "暂存配置文件与 CHANGELOG", "description": "使用 git add 将版本号和更新日志的修改添加到暂存区。", "duration_minutes": 1}, {"title": "提交修改", "description": "运行 git commit -m \"chore: bump to vX.Y.Z\" 创建提交，消息严格遵循 chore 类型。", "duration_minutes": 1}, {"title": "验证提交结果", "description": "运行 git log --oneline -1 查看最新提交信息，确认提交成功且工作区干净。", "duration_minutes": 2}]}, {"file": "04-tag.json", "title": "打标签 (Tagging)", "time": 15, "desc": "为当前提交创建版本标签并推送到远程，确保发布版本的唯一性和可追溯性。标签是发布流程中不可重写的锚点，用于稳定标记发布版本。", "steps": [{"description": "检查当前分支最近的提交（git log --oneline -1），确认提交内容与预期发布版本一致。根据语义化版本规范或项目约定确定标签版本号，如 v1.2.3 或 scope/v1.2.3。参考 CHANGELOG 或团队讨论确保版本号准确。", "duration_minutes": 3, "title": "确认当前提交与版本号"}, {"description": "根据项目类型执行标签创建命令：单组件项目使用 `git tag v1.2.3`；多组件项目使用 `git tag scope/v1.2.3`（例如 component/v1.0.1）。注意标签名不应与已有标签冲突，可先用 `git tag -l` 查看现有标签。此步骤生成指向当前提交的轻量或附注标签，建议使用附注标签（`-a`）以包含元信息。", "duration_minutes": 4, "title": "创建本地标签"}, {"description": "执行 `git push origin v1.2.3`（或具体标签名，如 `git push origin scope/v1.0.1`）将本地标签推送至远程仓库。注意只推送单个标签，避免推送所有标签（`--tags`）可能引入未就绪的标签。推送成功后，远程仓库会记录该标签为不可重写的发布锚点。", "duration_minutes": 4, "title": "推送标签到远程"}, {"description": "使用 `git ls-remote --tags origin` 或直接在远程仓库界面（如 GitHub/GitLab）确认标签已存在且指向正确提交。强调标签是发布流程中唯一不可重写的锚点，一旦推送即不可修改，因此需确保版本号准确无误。记录标签与发布版本的对应关系，更新发布文档或通知相关团队成员。", "duration_minutes": 4, "title": "验证远程标签并确认不可重写特性"}]}, {"file": "05-create-release.json", "title": "创建 GitHub Release", "time": 15, "desc": "在 GitHub 上创建 Release，并附上该版本的完整 CHANGELOG 内容。", "steps": [{"description": "检查当前项目版本号（例如 v1.2.3），确认本地 Git 标签已创建且与 CHANGELOG 中的版本一致。若标签缺失，先执行 `git tag v1.2.3` 并推送。", "duration_minutes": 2, "title": "确认版本号和本地标签"}, {"description": "从 CHANGELOG.md 中截取当前版本的完整内容。可使用命令：`awk '/^## v1.2.3/,/^## v/{if(!/^## v/ || NR==1) print; else exit}' CHANGELOG.md | head -n-1` 或 `sed` 提取。确认内容包含新特性、修复等条目。", "duration_minutes": 5, "title": "提取 CHANGELOG 条目"}, {"description": "运行 `gh release create v1.2.3 --title v1.2.3 --notes \"$(提取的内容)\"`。如果内容较长，可先保存到临时文件 `gh release create v1.2.3 --title v1.2.3 --notes-file /tmp/notes.txt`。确保 GitHub CLI 已认证。", "duration_minutes": 3, "title": "执行 gh release create 命令"}, {"description": "在浏览器中打开 GitHub 仓库的 Releases 页面，确认新版本已列出且标题、描述正确。也可用 `gh release view v1.2.3` 查看详情。检查附件（如二进制文件）是否已上传（若有要求）。", "duration_minutes": 3, "title": "验证 Release 发布成功"}, {"description": "如果使用 CI/CD 流程，将 Release 的 URL 或 ID 记录到构建产物中。例如保存到 `release_url.txt`。同时通知团队成员 Release 已完成，可开始部署或测试。", "duration_minutes": 2, "title": "更新本地或 CI 记录"}]}];
const excData = {"02-e1-changelog-missing.json": {"file": "02-e1-changelog-missing.json", "title": "补写缺失的 CHANGELOG 条目", "time": 15, "desc": "当 Release body 与 Tag 均存在但 CHANGELOG 文件中缺少对应版本的条目时，以 git log 为源，手动整理并补写 CHANGELOG。此过程确保变更记录准确、可追溯，不依赖可能不可靠的 Release body。", "steps": [{"description": "使用 git log 命令查看两个相邻 Tag（例如 v0.1.0..v0.2.0）之间的所有 commit 记录，输出一行摘要。例如执行：`git log v0.1.0..v0.2.0 --oneline`，得到类似 `a1b2c3d feat: 添加用户注册功能` 的列表。若有多个版本缺失，需依次获取每对 Tag 的 log。", "duration_minutes": 2, "title": "获取版本间的 git log"}, {"description": "将上一步得到的 commit 列表按照约定类型（feat、fix、refactor、docs、chore 等）手动分类。例如将 `feat: 添加用户注册功能` 归入“新特性”，将 `fix: 修复登录页面白屏` 归入“错误修复”。注意合并相同类型的 commit，并删除重复或无关的提交。对于不易分类的 commit，可参考 Git 提交信息中的 `type(scope)` 前缀。", "duration_minutes": 5, "title": "按类型分类整理 commit"}, {"description": "打开 Release 页面（如 GitHub Releases），查看已发布的 Release body。例如原文可能写有“新增用户注册、修复登录白屏、优化性能”。参照该列表确认是否遗漏了重要变更，但注意不可直接照搬 Release body 的文本（可能不完整或描述不准确）。若发现 Release body 中提到了某些 commit 但未出现在 git log 中，需核实是否存在额外合并或回滚。", "duration_minutes": 3, "title": "对照 Release body 辅助判断关键变更"}, {"description": "在 CHANGELOG.md 文件中找到对应版本号的位置（若版本号不存在则新建标题 `[v0.2.0] - 2025-04-01`）。按照 [Keep a Changelog](https://keepachangelog.com/) 格式写入分类列表，例如：\n\n## [v0.2.0] - 2025-04-01\n### 新特性\n- 添加用户注册功能\n### 错误修复\n- 修复登录页面白屏\n### 其他\n- 优化性能\n\n确保每条变更均引用 Commit 的简短哈希（可选，但推荐）。若存在多个缺失版本，依次完成每个版本的条目。", "duration_minutes": 3, "title": "补写 CHANGELOG 条目并格式化"}, {"description": "检查补写后的 CHANGELOG.md 文件格式是否正确：版本号、日期、分类结构对齐，无拼写错误。使用 `git diff` 确认修改内容。随后执行 git add 和 git commit，提交信息可写为 `docs(CHANGELOG): 补写 v0.2.0 版本变更记录`。", "duration_minutes": 2, "title": "验证格式并提交更改"}]}, "04-e1-tag-scope.json": {"file": "04-e1-tag-scope.json", "title": "Tag scope 前缀缺失修复", "time": 15, "desc": "当 Tag 属于某个 scope（如 cli）但漏写了 scope 前缀时，需要删除错误的根级别 tag，在正确的位置重建 tag（指向同一 commit），并处理可能存在的孤立 Release。", "steps": [{"description": "查看当前仓库中根级别 Tag 列表，定位缺少 scope 前缀的 Tag（例如误将 'v1.0.0' 而非 'cli/v1.0.0'）。确认该 Tag 对应的 commit 哈希。", "duration_minutes": 2, "title": "识别错误的根级别 Tag"}, {"description": "使用 git tag -d <tag-name> 删除错误的根级别 Tag。例如：git tag -d v1.0.0。若已远程推送，还需使用 git push origin :refs/tags/v1.0.0 删除远程 Tag。", "duration_minutes": 3, "title": "删除错误的根级别 Tag"}, {"description": "使用相同 commit 创建带 scope 前缀的正确 Tag。例如：git tag cli/v1.0.0 <commit-hash>。然后推送至远程：git push origin cli/v1.0.0。", "duration_minutes": 4, "title": "在正确 scope 下重建 Tag"}, {"description": "检查是否存在与错误 Tag 关联的 GitHub/GitLab Release。若有，则删除该孤立 Release，并在正确 Tag 下补建 Release（填写相同的版本说明及附件）。", "duration_minutes": 4, "title": "处理对应的 Release（若有）"}, {"description": "本地执行 git tag -l 'cli/*' 确认存在正确 Tag；远程查看 Release 列表，确认孤立 Release 已移除且正确 Release 已创建。最终可执行 git log --oneline -1 cli/v1.0.0 确认指向的 commit 与原 Tag 一致。", "duration_minutes": 2, "title": "验证修复结果"}]}, "05-e1-release-missing.json": {"file": "05-e1-release-missing.json", "title": "修复缺失的 GitHub Release", "time": 10, "desc": "当 Tag 和 CHANGELOG 已存在但缺少 Release 时，使用 CHANGELOG 内容补建 Release。这是最安全的修复——tag 和 CHANGELOG 都是已确认的事实源。", "steps": [{"description": "运行 git tag -l 确认目标 Tag（如 v0.2.0）已存在。打开 CHANGELOG.md 文件，找到对应版本的条目，确保条目清晰完整，例如包含修复、新功能等分类。若条目缺失或不一致，需先与团队确认。", "duration_minutes": 2, "title": "检查 Tag 与 CHANGELOG 一致性"}, {"description": "从 CHANGELOG.md 中复制该版本的所有内容（包括标题和条目）。例如，对于 v0.2.0，复制以 \"## [v0.2.0]\" 开头到下一个版本标题之前的所有文字。这些内容将作为 Release 的正文。", "duration_minutes": 2, "title": "提取 Release Notes 内容"}, {"description": "在终端执行命令：gh release create v0.2.0 --title v0.2.0 --notes \"<CHANGELOG条目内容>\"。若内容较长，可先写入临时文件，使用 --notes-file 参数。注意替换双引号内的占位符为实际文本。此命令会基于已有 Tag 创建 Release，并填充 release notes。", "duration_minutes": 3, "title": "创建 Release"}, {"description": "打开 GitHub 仓库的 Releases 页面（https://github.com/owner/repo/releases），确认新创建的 Release 已显示，检查 tag 名称、标题、内容是否与 CHANGELOG 一致。也可通过命令 gh release view v0.2.0 快速验证。", "duration_minutes": 3, "title": "验证发布结果"}]}};
function showDetail(idx) {
  const d = sceneData[idx];
  document.getElementById('detailFile').textContent = d.file;
  document.getElementById('detailTitle').textContent = d.title;
  document.getElementById('detailTime').textContent = '⏱ ' + d.time + '分钟';
  document.getElementById('detailDesc').textContent = d.desc;
  const stepsEl = document.getElementById('detailSteps');
  stepsEl.innerHTML = '';
  if (d.steps && d.steps.length > 0) {
    d.steps.forEach(s => {
      stepsEl.innerHTML += '<div class="step"><div class="step-title">📋 ' + s.title + '</div><div class="step-desc">' + s.description + '</div><div class="step-time">⏱ ' + s.duration_minutes + '分钟</div></div>';
    });
  }
  document.getElementById('detailPanel').classList.add('visible');
  document.querySelectorAll('.ring').forEach(r => r.classList.remove('active'));
  document.querySelectorAll('.ring')[idx].classList.add('active');
}
function showExcDetail(fileKey) {
  const d = excData[fileKey];
  if (!d) return;
  document.getElementById('detailFile').textContent = d.file;
  document.getElementById('detailTitle').textContent = '⚠️ ' + d.title;
  document.getElementById('detailTime').textContent = '⏱ ' + d.time + '分钟';
  document.getElementById('detailDesc').textContent = d.desc;
  const stepsEl = document.getElementById('detailSteps');
  stepsEl.innerHTML = '';
  if (d.steps && d.steps.length > 0) {
    d.steps.forEach(s => {
      stepsEl.innerHTML += '<div class="step" style="border-left-color:#ef4444;"><div class="step-title">⚠️ ' + s.title + '</div><div class="step-desc">' + s.description + '</div><div class="step-time">⏱ ' + s.duration_minutes + '分钟</div></div>';
    });
  }
  document.getElementById('detailPanel').classList.add('visible');
  document.querySelectorAll('.ring').forEach(r => r.classList.remove('active'));
}
</script>
