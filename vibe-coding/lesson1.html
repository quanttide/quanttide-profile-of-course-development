<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>课时1：开发环境搭建</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    .bar { border-bottom: 1px solid #30363d; padding: 16px 24px; background: #161b22; }
    .bar h1 { font-size: 20px; font-weight: 600; }
    .bar .meta { font-size: 13px; color: #8b949e; margin-top: 4px; }
    .main { display: grid; grid-template-columns: 1fr 360px; height: calc(100vh - 70px); }
    @media (max-width: 800px) { .main { grid-template-columns: 1fr; } }
    .video { display: flex; flex-direction: column; }
    .player { flex: 1; display: flex; align-items: center; justify-content: center;
              background: #000; color: #484f58; flex-direction: column; gap: 8px; font-size: 14px; }
    .player .icon { font-size: 48px; opacity: 0.3; }
    .scene-name { padding: 12px 24px; border-top: 1px solid #30363d; background: #161b22;
                  font-size: 15px; font-weight: 500; }
    .panel { border-left: 1px solid #30363d; overflow-y: auto; display: flex; flex-direction: column; }
    .panel h3 { padding: 12px 16px; border-bottom: 1px solid #30363d; font-size: 13px;
                font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
    .nav { padding: 8px 12px; border-bottom: 1px solid #21262d; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px;
                cursor: pointer; font-size: 14px; }
    .nav-item:hover { background: #1c2128; }
    .nav-item.active { background: #1f6feb22; color: #58a6ff; }
    .nav-item .dot { width: 8px; height: 8px; border-radius: 50%; background: #30363d; flex-shrink: 0; }
    .nav-item.active .dot { background: #58a6ff; }
    .nav-item.done .dot { background: #3fb950; }
    .steps { padding: 8px 12px; flex: 1; }
    .step { display: flex; gap: 10px; padding: 8px; border-radius: 6px;
            border-left: 3px solid transparent; margin-bottom: 2px; }
    .step.now { border-left-color: #58a6ff; background: #1f6feb11; }
    .step .num { width: 24px; height: 24px; border-radius: 50%; background: #21262d;
                 display: flex; align-items: center; justify-content: center;
                 font-size: 12px; font-weight: 600; flex-shrink: 0; color: #8b949e; }
    .step.now .num { background: #1f6feb; color: #fff; }
    .step .txt { font-size: 14px; line-height: 1.6; padding-top: 2px; }
    .tip { margin: 4px 12px 12px; padding: 10px 12px; border-radius: 6px;
           background: #1c2128; border: 1px solid #30363d; font-size: 13px; color: #8b949e; }
    .tip strong { color: #d2a8ff; }
    .next { padding: 8px 16px 16px; border-top: 1px solid #21262d; }
    .next button { padding: 8px 24px; border-radius: 6px; border: 1px solid #30363d;
                   background: #21262d; color: #c9d1d9; font-size: 14px; cursor: pointer; }
    .next button:hover { border-color: #58a6ff; color: #58a6ff; background: #1f6feb11; }
    .done-page { display: none; padding: 48px 24px; text-align: center; }
    .done-page.show { display: block; }
    .done-page .emoji { font-size: 48px; margin-bottom: 8px; }
    .done-page h2 { font-size: 18px; color: #3fb950; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="bar">
  <h1>课时1：开发环境搭建</h1>
  <div class="meta">30 分钟 · 3 个场景</div>
</div>

<div class="main" id="main">
  <div class="video">
    <div class="player">
      <div class="icon">▶</div>
      <div>视频播放区域</div>
      <div style="font-size:12px;color:#30363d;" id="vpath"></div>
    </div>
    <div class="scene-name" id="sname">—</div>
  </div>

  <div class="panel">
    <h3>操作步骤</h3>
    <div class="nav" id="nav"></div>
    <div class="steps" id="steps"></div>
    <div class="tip" id="tip"></div>
    <div class="next" id="next"></div>
  </div>
</div>

<div class="done-page" id="done">
  <div class="emoji">🎉</div>
  <h2>课时完成</h2>
  <p style="color:#8b949e;font-size:14px;">你已完成「开发环境搭建」的所有场景。</p>
</div>

<script>
const lesson = {
  title: "开发环境搭建",
  duration: 30,
  scenes: [
    { id:"vibe-s1", name:"zed-setup", title:"Zed 的安装与初始化",
      videoUrl:"vibe-coding/lesson1/zed-setup.mp4",
      steps:[
        {order:1,content:"访问 zed.dev 下载 Zed 编辑器"},
        {order:2,content:"安装并打开 Zed"},
        {order:3,content:"根据引导选择主题配色"},
        {order:4,content:"配置快捷键布局（Vim / VS Code / 默认）"},
        {order:5,content:"安装推荐的插件或语言扩展"}
      ],
      verifyTip:"Zed 编辑器能正常编辑和预览文件即表示安装初始化完成",
      choices:[{label:"继续", target:"vibe-s3"}]
    },
    { id:"vibe-s2", name:"deepseek-auth", title:"注册并获取 DeepSeek 密钥",
      videoUrl:"vibe-coding/lesson1/deepseek-auth.mp4",
      steps:[
        {order:1,content:"访问 DeepSeek 官网，点击注册"},
        {order:2,content:"填写信息完成邮箱/手机验证"},
        {order:3,content:"登录后进入 API 管理页面"},
        {order:4,content:"点击创建新密钥并复制到剪贴板"}
      ],
      verifyTip:"已成功复制 API 密钥，可在下一步配置中使用",
      choices:[{label:"继续", target:"vibe-s3"}]
    },
    { id:"vibe-s3", name:"configure-zed", title:"Zed Agent 配置 DeepSeek 密钥",
      videoUrl:"vibe-coding/lesson1/configure-zed.mp4",
      steps:[
        {order:1,content:"在 Zed 中点击左上角星星图标，打开 Zed Agent 面板"},
        {order:2,content:"点击 Zed Agent 右下角倒数第二个按钮「Select a model」"},
        {order:3,content:"点击 Configure，进入模型配置页面"},
        {order:4,content:"点击 LLM Provider，进入 API 密钥配置页面"},
        {order:5,content:"下拉列表找到 DeepSeek，填入之前复制的 API 密钥"},
        {order:6,content:"关闭配置页面，回到 Zed Agent，输入一条消息尝试对话"}
      ],
      verifyTip:"在 Zed Agent 中输入「hello」或「你好」，若 DeepSeek 正常返回回复即表示配置完成",
      choices:[]
    }
  ]
};

const map = Object.fromEntries(lesson.scenes.map(s=>[s.id,s]));
let cur = "vibe-s1";

function render() {
  const s = map[cur];
  if (!s) return;
  document.getElementById("sname").textContent = s.title;
  document.getElementById("vpath").textContent = "🎬 " + s.videoUrl;
  document.getElementById("nav").innerHTML = lesson.scenes.map(sc =>
    `<div class="nav-item${sc.id===cur?" active":""}" data-id="${sc.id}">
      <span class="dot"></span><span>${sc.title}</span>
    </div>`
  ).join("");
  document.querySelectorAll(".nav-item").forEach(el =>
    el.onclick = ()=> { cur=el.dataset.id; render(); }
  );
  document.getElementById("steps").innerHTML = s.steps.map((st,i) =>
    `<div class="step${i===0?" now":""}">
      <div class="num">${st.order}</div>
      <div class="txt">${st.content}</div>
    </div>`
  ).join("");
  document.getElementById("tip").innerHTML = s.verifyTip
    ? `<strong>✅ 验证：</strong>${s.verifyTip}` : "";
  document.getElementById("next").innerHTML = s.choices.length
    ? s.choices.map(c => `<button data-t="${c.target}">${c.label} →</button>`).join("")
    : `<button onclick="finish()">完成课时 🎉</button>`;
  document.querySelectorAll("#next button").forEach(b => {
    if (b.dataset.t) b.onclick = ()=> { cur=b.dataset.t; render(); };
  });
  document.getElementById("main").style.display = "grid";
  document.getElementById("done").classList.remove("show");
}

function finish() {
  document.getElementById("main").style.display = "none";
  document.getElementById("done").classList.add("show");
}

render();
</script>
</body>
</html>
