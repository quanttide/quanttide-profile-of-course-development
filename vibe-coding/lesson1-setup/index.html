<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开发环境搭建 — 五环图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.container { max-width: 1000px; width: 100%; }
h1 { text-align: center; font-size: 22px; margin-bottom: 4px; color: #f1f5f9; }
.subtitle { text-align: center; font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
.stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
.stat { text-align: center; }
.stat-value { font-size: 28px; font-weight: 700; color: #38bdf8; }
.stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

/* 五环布局 */
.rings { display: flex; justify-content: center; align-items: flex-start; gap: 0; position: relative; margin: 30px 0 20px; flex-wrap: wrap; }
.ring-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; margin: 0 -12px; }
.ring { width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; position: relative; border: 3px solid transparent; }
.ring:hover { transform: scale(1.08); z-index: 10; }
.ring.active { transform: scale(1.08); z-index: 10; }
.ring-num { font-size: 11px; font-weight: 700; opacity: 0.7; }
.ring-title { font-size: 13px; font-weight: 600; text-align: center; padding: 0 8px; line-height: 1.2; margin: 2px 0; }
.ring-time { font-size: 11px; opacity: 0.7; }

.ring-color-0 { background: rgba(56, 189, 248, 0.15); border-color: #38bdf8; color: #7dd3fc; }
.ring-color-1 { background: rgba(34, 211, 238, 0.15); border-color: #22d3ee; color: #67e8f9; }
.ring-color-2 { background: rgba(52, 211, 153, 0.15); border-color: #34d399; color: #6ee7b7; }
.ring-color-3 { background: rgba(251, 191, 36, 0.15); border-color: #fbbf24; color: #fcd34d; }
.ring-color-4 { background: rgba(248, 113, 113, 0.15); border-color: #f87171; color: #fca5a5; }

/* 连线 */
.connector { width: 30px; height: 3px; background: #334155; align-self: center; margin: 0 -6px; flex-shrink: 0; }
.connector-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; color: #475569; }

/* 详情面板 */
.detail-panel { display: none; background: #1e293b; border-radius: 12px; padding: 20px; margin-top: 20px; border: 1px solid #334155; }
.detail-panel.visible { display: block; }
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.detail-file { font-size: 11px; background: #334155; padding: 2px 8px; border-radius: 4px; color: #94a3b8; font-family: monospace; }
.detail-title { font-size: 18px; font-weight: 600; }
.detail-time { font-size: 13px; color: #94a3b8; margin-left: auto; }
.detail-desc { font-size: 13px; color: #cbd5e1; line-height: 1.6; margin-bottom: 16px; }
.steps { display: flex; flex-direction: column; gap: 8px; }
.step { background: #0f172a; border-radius: 8px; padding: 12px 16px; border-left: 3px solid #38bdf8; }
.step-title { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
.step-desc { font-size: 12px; color: #94a3b8; line-height: 1.5; }
.step-time { font-size: 11px; color: #64748b; margin-top: 4px; }

/* 异常标签 */
.exception-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 8px; display: none; }
.exception-badge.has-exc { display: block; }

/* 异常场景小标签 */
.exc-ring { width: 80px; height: 80px; border-radius: 50%; background: rgba(239, 68, 68, 0.12); border: 2px solid #ef4444; color: #fca5a5; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; margin: 0 6px; }
.exc-ring:hover { transform: scale(1.08); }
.exc-ring .ring-title { font-size: 11px; }
.exc-ring .ring-time { font-size: 10px; }

@media (max-width: 700px) {
  .ring { width: 100px; height: 100px; }
  .ring-title { font-size: 11px; }
  .connector { width: 15px; }
  .ring-wrapper { margin: 0 -8px; }
}
</style>
</head>
<body>
<div class="container">
<h1>📚 开发环境搭建</h1>
<div class="subtitle">完成Zed编辑器安装、初始化，DeepSeek账号注册与密钥获取，以及Zed Agent配置，为AI辅助编程打下基础。</div>
<div class="stats">
  <div class="stat"><div class="stat-value">3</div><div class="stat-label">场景</div></div>
  <div class="stat"><div class="stat-value">1</div><div class="stat-label">异常分支</div></div>
  <div class="stat"><div class="stat-value">45</div><div class="stat-label">总时长</div></div>
</div>

<div class="rings">
  <div class="ring-wrapper">
    <div class="ring ring-color-0" data-idx="0" onclick="showDetail(0)">
      <span class="ring-num">场景 1</span>
      <span class="ring-title">Zed 编辑器安装与初始化</span>
      <span class="ring-time">⏱ 15分钟</span>
    </div>
  </div>
  <div class="connector"></div>
  <div class="ring-wrapper">
    <div class="ring ring-color-1" data-idx="1" onclick="showDetail(1)">
      <span class="ring-num">场景 2</span>
      <span class="ring-title">vc-s2-deepseek-auth</span>
      <span class="ring-time">⏱ 15分钟</span>
    </div>
  </div>
  <div class="connector"></div>
  <div class="ring-wrapper">
    <div class="ring ring-color-2" data-idx="2" onclick="showDetail(2)">
      <span class="ring-num">场景 3</span>
      <span class="ring-title">vc-s3-configure-zed</span>
      <span class="ring-time">⏱ 15分钟</span>
    </div>
  </div>
</div>

<!-- 异常环 -->
<div style="display:flex;justify-content:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
  <div class="exc-ring" onclick="showExcDetail('02-e1-auth-failure.json')">
    <span style="font-size:9px;font-weight:700;color:#ef4444;">⚠️</span>
    <span class="ring-title">DeepSeek 注册异常处理流程</span>
    <span class="ring-time">⏱ 15分钟</span>
  </div>
</div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <span class="detail-file" id="detailFile"></span>
    <span class="detail-title" id="detailTitle"></span>
    <span class="detail-time" id="detailTime"></span>
  </div>
  <div class="detail-desc" id="detailDesc"></div>
  <div class="steps" id="detailSteps"></div>
</div>
</div>

<script>
const sceneData = [{"file": "01-zed-setup.json", "title": "Zed 编辑器安装与初始化", "time": 15, "desc": "下载并安装 Zed 编辑器，完成主题选择、快捷键布局配置及推荐插件安装，为氛围编程开发环境搭建第一步。", "steps": [{"description": "访问 zed.dev 官网，根据操作系统（Windows/macOS/Linux）下载对应安装包。Windows 用户运行安装程序，macOS 用户拖拽至 Applications 文件夹，Linux 用户使用包管理器或解压运行。", "duration_minutes": 5, "title": "下载并安装 Zed"}, {"description": "首次打开 Zed，在欢迎界面根据引导选择喜欢的主题配色（如 One Dark、Solarized Light 等）。点击确认后主题自动应用。", "duration_minutes": 2, "title": "启动并选择主题配色"}, {"description": "在设置向导中选择快捷键布局：Vim 模式（适合 Vim 用户）、VS Code 模式（迁移友好）或 Zed 默认。选择后重启编辑器生效。", "duration_minutes": 3, "title": "配置快捷键布局"}, {"description": "打开命令面板（Cmd+Shift+P 或 Ctrl+Shift+P），输入“extensions”进入扩展面板。搜索并安装常用语言支持（如 Python、Rust、TypeScript）以及 Git 增强、LSP 等插件。以 Python 为例：搜索“Python”点击安装。", "duration_minutes": 4, "title": "安装推荐插件和语言扩展"}, {"description": "创建一个新文件（例如 test.py），输入简单代码（如 print(\"Hello Zed\")）。检查语法高亮、括号匹配和自动补全是否正常。确认主题、快捷键和插件均生效。", "duration_minutes": 1, "title": "验证安装与初始化完成"}]}, {"file": "02-deepseek-auth.json", "title": "vc-s2-deepseek-auth", "time": 15, "desc": "注册 DeepSeek 账号并获取 API 密钥，为后续氛围编程开发环境搭建提供认证凭据。", "steps": [{"description": "打开浏览器，访问 DeepSeek 官方网站（如 deepseek.com），点击页面右上角的“注册”按钮。填写用户名、邮箱地址和密码，完成基础注册信息提交。注意：如果遇到验证码接收失败，可尝试更换邮箱或检查垃圾邮件箱，或稍后重试。", "duration_minutes": 3, "title": "访问官网并注册账号"}, {"description": "注册后系统会发送验证邮件或短信。登录邮箱，找到 DeepSeek 发送的验证链接并点击确认；若使用手机验证，输入收到的验证码完成绑定。验证成功后账号即激活。若未收到验证码，可在注册页面点击“重新发送”按钮，或检查手机号格式是否正确。", "duration_minutes": 4, "title": "完成邮箱/手机验证"}, {"description": "回到 DeepSeek 官网，使用注册的邮箱和密码登录。登录成功后，在用户头像或账户设置中找到“API 管理”或“开发者”选项，点击进入 API 密钥管理页面。若页面找不到入口，可参考官网文档或联系客服。", "duration_minutes": 3, "title": "登录并进入API管理页面"}, {"description": "在 API 管理页面，点击“创建新密钥”按钮，系统会生成一串唯一的 API 密钥。立即点击“复制”按钮将密钥保存到剪贴板，并粘贴到本地安全位置（如密码管理器或环境变量文件）。注意：密钥创建后不会再次完整显示，务必及时保存；若遗忘，需删除旧密钥并重新创建。", "duration_minutes": 5, "title": "创建并复制API密钥"}]}, {"file": "03-configure-zed.json", "title": "vc-s3-configure-zed", "time": 15, "desc": "在 Zed 编辑器中为 Agent 配置 DeepSeek API 密钥，使其能够调用 AI 模型进行对话和代码辅助。", "steps": [{"description": "点击 Zed 编辑器左上角的星星图标（或使用快捷键 Ctrl+Shift+A / Cmd+Shift+A），打开 Zed Agent 侧边面板。", "duration_minutes": 2, "title": "打开 Zed Agent 面板"}, {"description": "在 Zed Agent 面板右下角找到倒数第二个按钮「Select a model」并点击，然后点击弹出的 Configure 按钮，进入模型配置页面。", "duration_minutes": 3, "title": "进入模型选择与配置页面"}, {"description": "在配置页面点击「LLM Provider」，从下拉列表中选择 DeepSeek。在密钥输入框中粘贴之前复制好的 DeepSeek API 密钥（如 sk-xxxxxxxx），确保无多余空格。", "duration_minutes": 5, "title": "配置 DeepSeek API 密钥"}, {"description": "关闭配置页面返回 Zed Agent 面板，在输入框中输入一条测试消息（例如“Hello”），点击发送。若正常收到回复，则配置成功。", "duration_minutes": 5, "title": "验证配置并测试对话"}]}];
const excData = {"02-e1-auth-failure.json": {"file": "02-e1-auth-failure.json", "title": "DeepSeek 注册异常处理流程", "time": 15, "desc": "针对 DeepSeek 注册过程中可能遇到的验证码接收失败、密钥未保存、信息填写错误等常见问题，提供有序的排查与解决步骤。", "steps": [{"description": "检查手机号或邮箱是否输入正确（如中国手机号需加+86），确认密码复杂度符合要求（至少8位含字母和数字）。若发现错误，点击返回上一步修改。若信息无误但验证码未收到，进入下一步。", "duration_minutes": 3, "title": "核对注册信息"}, {"description": "在注册页面点击「重新发送验证码」按钮。若多次尝试仍无法接收，检查手机短信拦截/邮箱垃圾箱，或更换接收方式（如从手机号改为邮箱）。等待60秒后再次尝试。", "duration_minutes": 4, "title": "重新获取验证码"}, {"description": "若已成功创建账号但未及时保存 API 密钥，登录后进入 API 管理页面，在「密钥列表」中查找已存在的密钥并复制保存；若密钥未显示，可点击「创建新密钥」生成新密钥并立即备份。", "duration_minutes": 4, "title": "处理密钥保存遗漏"}, {"description": "重新尝试完整注册流程，若仍失败，清除浏览器缓存/更换浏览器或网络环境（如切换4G/WiFi）。如异常持续，记录错误提示并联系 DeepSeek 技术支持（support@deepseek.com）或查看官方帮助文档。", "duration_minutes": 4, "title": "最终验证与辅助方案"}]}};

function showDetail(idx) {
  const d = sceneData[idx];
  document.getElementById('detailFile').textContent = d.file;
  document.getElementById('detailTitle').textContent = d.title;
  document.getElementById('detailTime').textContent = '⏱ ' + d.time + '分钟';
  document.getElementById('detailDesc').textContent = d.desc;
  const stepsEl = document.getElementById('detailSteps');
  stepsEl.innerHTML = '';
  if (d.steps && d.steps.length > 0) {
    d.steps.forEach(s => {
      stepsEl.innerHTML += '<div class="step"><div class="step-title">📋 ' + s.title + '</div><div class="step-desc">' + s.description + '</div><div class="step-time">⏱ ' + s.duration_minutes + '分钟</div></div>';
    });
  } else {
    stepsEl.innerHTML = '<div style="color:#64748b;font-size:13px;">暂无步骤详情</div>';
  }
  document.getElementById('detailPanel').classList.add('visible');
  
  document.querySelectorAll('.ring').forEach(r => r.classList.remove('active'));
  document.querySelectorAll('.ring')[idx].classList.add('active');
}

function showExcDetail(fileKey) {
  const d = excData[fileKey];
  if (!d) return;
  document.getElementById('detailFile').textContent = d.file;
  document.getElementById('detailTitle').textContent = '⚠️ ' + d.title;
  document.getElementById('detailTime').textContent = '⏱ ' + d.time + '分钟';
  document.getElementById('detailDesc').textContent = d.desc;
  const stepsEl = document.getElementById('detailSteps');
  stepsEl.innerHTML = '';
  if (d.steps && d.steps.length > 0) {
    d.steps.forEach(s => {
      stepsEl.innerHTML += '<div class="step" style="border-left-color:#ef4444;"><div class="step-title">⚠️ ' + s.title + '</div><div class="step-desc">' + s.description + '</div><div class="step-time">⏱ ' + s.duration_minutes + '分钟</div></div>';
    });
  }
  document.getElementById('detailPanel').classList.add('visible');
  document.querySelectorAll('.ring').forEach(r => r.classList.remove('active'));
}
</script>
</body>
</html>
